<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
       body {
        font-family: Arial, Helvetica, sans-serif;
       }

       table {
        width: 400px;
        border-collapse: collapse;
       }

       tr.linha {
        background-color: gray;
       }

       td {
        border: 1px solid black;
        padding: 8px;
       }

       td.dado {
        background-color: yellow;
       }
    </style>
</head>
<body>
    <h1>
        Minha primeira tabela
    </h1>
<!--
    HIREARQUIA DE TABELA (SIMPLES)
    TABLE = tabela
        TABLE ROW = linha de tabela
            TABLE HEADER = cabeçario de tabela
            TABLE DATA= dado de tabela
-->
    <table>
        <tr> <!--primeira linha-->
            <td>A1
            <td>B1
            <td>C1
        </tr>
        <tr class="linha"> <!--segunda linha-->
           <td>A2
           <td>B2
           <td>C2
        </tr>
        <tr> <!--terceira linha-->
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr> <!--quarta linha-->
            <td>A4</td>
            <td class="dado">B4</td>
            <td>C4</td>
        </tr>

    </table>
</body>
</html>
